<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pace Converter for Garmin</title>
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="manifest.json" />
    <meta
      name="description"
      content="A sleek pace converter for Garmin runners."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <meta
      name="google-site-verification"
      content="y_fadyx-KOBMoXqEHN_AWKqlFVjnhGMf3H0nZjqrTZg"
    />
    <meta
      name="naver-site-verification"
      content="d585712754d0221cdea767c063e114a3bc175960"
    />
  </head>
  <body>
    <div class="backdrop">
      <div class="bg-layer bg-layer-0"></div>
      <div class="bg-layer bg-layer-1"></div>
      <div class="bg-layer bg-layer-2"></div>
    </div>

    <main class="carousel" id="carousel">
      <div class="carousel-track" id="carousel-track">
        <section class="page page-converter">
          <article class="card">
            <div class="card-inner">
              <header class="card-header">
                <h1>Pace Converter</h1>
                <p class="card-subtitle">Convert pace, speed, and race times</p>
              </header>

              <div class="card-body converter-box">
                <div class="field">
                  <label for="pace-km">Pace (min/km)</label>
                  <input
                    type="text"
                    id="pace-km"
                    placeholder="e.g. 5:30"
                    autocomplete="off"
                    inputmode="numeric"
                  />
                </div>

                <div class="icon-swap" aria-hidden="true">
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M7 10v12" />
                    <path d="M15 10v12" />
                    <path d="m11 14-4-4-4 4" />
                    <path d="m19 14-4-4-4 4" />
                    <path d="M7 2v8" />
                    <path d="M15 2v8" />
                  </svg>
                </div>

                <div class="field">
                  <label for="speed-kmh">Speed (km/h)</label>
                  <input
                    type="text"
                    id="speed-kmh"
                    placeholder="0.0"
                    autocomplete="off"
                    inputmode="decimal"
                  />
                </div>

                <div class="divider"></div>

                <div class="field-row">
                  <div class="field">
                    <label for="finishtime-10k">10K</label>
                    <input
                      type="text"
                      id="finishtime-10k"
                      placeholder="0:00:00"
                      autocomplete="off"
                      inputmode="numeric"
                    />
                  </div>
                  <div class="field">
                    <label for="finishtime-half">Half</label>
                    <input
                      type="text"
                      id="finishtime-half"
                      placeholder="0:00:00"
                      autocomplete="off"
                      inputmode="numeric"
                    />
                  </div>
                  <div class="field">
                    <label for="finishtime-full">Full</label>
                    <input
                      type="text"
                      id="finishtime-full"
                      placeholder="0:00:00"
                      autocomplete="off"
                      inputmode="numeric"
                    />
                  </div>
                </div>
              </div>

              <footer class="card-footer">
                <a
                  href="https://buymeacoffee.com/spacechild7"
                  target="_blank"
                  rel="noopener"
                >
                  ☕ Buy me a coffee
                </a>
              </footer>
            </div>
          </article>
        </section>

        <section class="page page-workout">
          <article class="card">
            <div class="card-inner">
              <header class="card-header">
                <h1>Structured Workout</h1>
                <p class="card-subtitle">When you do a multi-stage workout</p>
              </header>

              <div class="card-body workout-box">
                <div class="section-heading">
                  <span>Workout Paces</span>
                  <button
                    type="button"
                    class="add-button"
                    id="add-workout-row"
                    aria-label="Add workout row"
                  >
                    + Add
                  </button>
                </div>

                <div class="workout-rows" id="workout-rows">
                  <div class="workout-row" data-row-id="1">
                    <div class="workout-lane">
                      <div class="field">
                        <label for="workout-pace-1">Step 1</label>
                        <input
                          type="text"
                          id="workout-pace-1"
                          class="workout-pace-input"
                          placeholder="e.g. 6:15"
                          autocomplete="off"
                          inputmode="numeric"
                        />
                      </div>
                      <div class="workout-arrow" aria-hidden="true">→</div>
                      <div class="speed-chip">
                        <span class="speed-chip-label">Speed</span>
                        <strong class="speed-chip-value" data-speed-for="1"
                          >--</strong
                        >
                        <span class="speed-chip-unit">km/h</span>
                      </div>
                    </div>
                  </div>

                  <div class="workout-row" data-row-id="2">
                    <div class="workout-lane">
                      <div class="field">
                        <label for="workout-pace-2">Step 2</label>
                        <input
                          type="text"
                          id="workout-pace-2"
                          class="workout-pace-input"
                          placeholder="e.g. 5:05"
                          autocomplete="off"
                          inputmode="numeric"
                        />
                      </div>
                      <div class="workout-arrow" aria-hidden="true">→</div>
                      <div class="speed-chip">
                        <span class="speed-chip-label">Speed</span>
                        <strong class="speed-chip-value" data-speed-for="2"
                          >--</strong
                        >
                        <span class="speed-chip-unit">km/h</span>
                      </div>
                    </div>
                  </div>

                  <div class="workout-row" data-row-id="3">
                    <div class="workout-lane">
                      <div class="field">
                        <label for="workout-pace-3">Step 3</label>
                        <input
                          type="text"
                          id="workout-pace-3"
                          class="workout-pace-input"
                          placeholder="e.g. 6:30"
                          autocomplete="off"
                          inputmode="numeric"
                        />
                      </div>
                      <div class="workout-arrow" aria-hidden="true">→</div>
                      <div class="speed-chip">
                        <span class="speed-chip-label">Speed</span>
                        <strong class="speed-chip-value" data-speed-for="3"
                          >--</strong
                        >
                        <span class="speed-chip-unit">km/h</span>
                      </div>
                    </div>
                  </div>

                  <div class="workout-row is-hidden" data-row-id="4">
                    <div class="workout-lane">
                      <div class="field">
                        <label for="workout-pace-4">Step 4</label>
                        <input
                          type="text"
                          id="workout-pace-4"
                          class="workout-pace-input"
                          placeholder="e.g. 6:00"
                          autocomplete="off"
                          inputmode="numeric"
                        />
                      </div>
                      <div class="workout-arrow" aria-hidden="true">→</div>
                      <div class="speed-chip">
                        <span class="speed-chip-label">Speed</span>
                        <strong class="speed-chip-value" data-speed-for="4"
                          >--</strong
                        >
                        <span class="speed-chip-unit">km/h</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <footer class="card-footer">
                <p>for Garmin Runners</p>
              </footer>
            </div>
          </article>
        </section>

        <section class="page page-race-goals">
          <article class="card">
            <div class="card-inner">
              <header class="card-header">
                <h1>Next Race</h1>
                <p class="card-subtitle">Best record, and your next</p>
              </header>

              <footer class="card-footer">
                <p>for Garmin Runners</p>
              </footer>
            </div>
          </article>
        </section>
      </div>

      <div class="indicator" id="indicator" aria-label="Page navigation">
        <button
          type="button"
          class="dot active"
          data-index="0"
          aria-label="Go to page 1"
        ></button>
        <button
          type="button"
          class="dot"
          data-index="1"
          aria-label="Go to page 2"
        ></button>
        <button
          type="button"
          class="dot"
          data-index="2"
          aria-label="Go to page 3"
        ></button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
